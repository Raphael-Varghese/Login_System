{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Edit Task #{{ task.id }}</h2>

<div class="card p-4 shadow-sm" style="max-width: 600px;">
    <form method="post">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input name="title" class="form-control" value="{{ task.title }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ task.description }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Assign to</label>
            <select name="assigned_to" class="form-select">
                <option value="">-- none --</option>
                {% for u in users %}
                    <option value="{{ u.id }}" {% if task.assigned_to == u.id %}selected{% endif %}>{{ u.username }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" name="completed" id="completed" {% if task.completed %}checked{% endif %}>
            <label class="form-check-label" for="completed">Completed?</label>
        </div>

        <button class="btn btn-primary w-100">Save</button>
    </form>
</div>
{% endblock %}
