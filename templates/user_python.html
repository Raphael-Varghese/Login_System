{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">User Python Console</h2>

<div class="card p-4 shadow-sm">
    <form method="post">
        <textarea name="code" class="form-control" rows="6" placeholder="Python code..."></textarea>
        <button class="btn btn-primary mt-3 w-100">Run</button>
    </form>
</div>

{% if output %}
<div class="card p-4 shadow-sm mt-4 bg-light">
    <h5>Output</h5>
    <pre>{{ output }}</pre>
</div>
{% endif %}
{% endblock %}
