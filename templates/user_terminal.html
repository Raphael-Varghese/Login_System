{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">User Terminal</h2>

<div class="card p-4 shadow-sm">
    <form method="post">
        <textarea name="cmd" class="form-control" rows="4" placeholder="Enter command..."></textarea>
        <button class="btn btn-secondary mt-3 w-100">Run Command</button>
    </form>
</div>

{% if output %}
<div class="card p-4 shadow-sm mt-4 bg-light">
    <h5>Output</h5>
    <pre>{{ output }}</pre>
</div>
{% endif %}
{% endblock %}
